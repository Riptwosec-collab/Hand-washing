<!doctype html>
<html lang="th">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ลิงก์แบบประเมินรายชื่อ</title>
    <link rel="stylesheet" href="styles.css" />
    <style>
      .staff-page {
        width: min(100% - 32px, 720px);
        margin: 22px auto 42px;
      }

      .staff-list {
        display: grid;
        gap: 10px;
      }

      .staff-link {
        display: flex;
        align-items: center;
        min-height: 54px;
        padding: 12px 14px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #ffffff;
        color: var(--primary-dark);
        font-size: 17px;
        font-weight: 700;
        text-decoration: none;
        box-shadow: 0 8px 18px rgba(28, 61, 55, 0.08);
      }

      .staff-link:hover {
        border-color: var(--primary);
        background: var(--primary-soft);
      }
    </style>
  </head>
  <body>
    <main class="staff-page">
      <section class="form-title">
        <div class="accent"></div>
        <p class="eyebrow">Staff Links</p>
        <h2>ลิงก์แบบประเมินรายชื่อ</h2>
        <p class="form-subtitle">กดชื่อเพื่อเปิดแบบประเมินพร้อมเติมชื่ออัตโนมัติ หากกดผิดให้กดปุ่มย้อนกลับบนแบบฟอร์ม</p>
      </section>

      <section class="question-card">
        <div class="staff-list" id="staffList"></div>
      </section>
    </main>

    <script>
      const staffNames = [
        "คุณอนัตยา",
        "คุณพัชรพร",
        "คุณพิพินา",
        "คุณอลิน",
        "คุณสัสรชัย",
        "คุณนารียา",
        "คุณนุ้ย",
        "คุณวาวรรณ",
        "คุณรังสินา",
        "คุณขนิษฐา",
        "คุณอัสรีราช",
        "คุณวาดียา",
        "คุณรุ่งอรัย",
        "คุณวารีการ",
        "คุณสุกรยา",
        "คุณณัฐณิชา",
        "คุณน้ำฝน",
        "คุณวนิดา",
        "คุณฟาริดา",
        "คุณธัญชนก",
        "คุณอัญชลี",
        "คุณธนัชสิรี",
        "คุณศิริวรรณ",
        "คุณธากา",
        "คุณศรีธนญา",
        "คุณสายฯ",
        "คุณเปี่ยลด",
        "คุณวรากานต์",
        "คุณอัครชัย",
        "คุณพาณิชยา",
        "คุณสุพัตรา",
        "คุณเดือนเพ็ญ",
        "คุณชุติมา",
        "คุณลักษิกา",
        "คุณสุพัตรา ระ",
      ];

      const staffList = document.querySelector("#staffList");

      staffList.innerHTML = staffNames
        .map((name) => {
          const url = `form.html?name=${encodeURIComponent(name)}`;
          return `<a class="staff-link" href="${url}">${name}</a>`;
        })
        .join("");
    </script>
  </body>
</html>
